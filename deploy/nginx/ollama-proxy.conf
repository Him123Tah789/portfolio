# Reverse proxy for exposing an Ollama instance safely to Vercel backend traffic.
# Replace domain names, TLS paths, and token before use.

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ollama.example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ollama.example.com;

    ssl_certificate /etc/letsencrypt/live/ollama.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ollama.example.com/privkey.pem;

    # Restrict request body and enforce reasonable request timeouts.
    client_max_body_size 2m;
    client_body_timeout 15s;
    send_timeout 60s;

    # Basic per-IP limits at proxy layer.
    limit_req_zone $binary_remote_addr zone=ollama_req_per_ip:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=ollama_conn_per_ip:10m;

    # Health endpoint (optional)
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        # Apply rate and connection limits.
        limit_req zone=ollama_req_per_ip burst=20 nodelay;
        limit_conn ollama_conn_per_ip 10;

        # Require bearer token from upstream caller (Vercel backend).
        if ($http_authorization = "") {
            return 401;
        }

        if ($http_authorization != "Bearer REPLACE_WITH_STRONG_TOKEN") {
            return 403;
        }

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Match your Ollama local endpoint.
        proxy_pass http://127.0.0.1:11434;

        # Timeouts tuned for model inference.
        proxy_connect_timeout 5s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;

        # Surface upstream issues quickly.
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }
}
